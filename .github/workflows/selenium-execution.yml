name: BStackDemo Selenium UI Tests

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

# This tells GitHub to use the new Node 24 engine to silence the deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Updated to v4 to ensure latest Java compatibility
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven

    # We no longer need xvfb because we are using native headless Chrome!
    - name: Run E-Commerce Tests
      run: mvn clean test

    - name: Upload Extent Report
      uses: actions/upload-artifact@v4
      if: always() 
      with:
        name: Automation-Test-Report
        path: reports/ExtentReport.html