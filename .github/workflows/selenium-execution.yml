name: BStackDemo Selenium UI Tests

# This tells GitHub to run the tests automatically when you push code, 
# and also gives you a manual "Run workflow" button in the UI.
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. Grabs your code from the repository
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Installs Java 11 on the GitHub server
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven

    # 3. Runs your Maven command using a "fake monitor" (xvfb)
    - name: Run E-Commerce Tests
      run: xvfb-run mvn clean test

    # 4. Grabs your beautiful ExtentReport and saves it as a downloadable file!
    - name: Upload Extent Report
      uses: actions/upload-artifact@v4
      if: always() # This ensures the report uploads even if a test fails
      with:
        name: Automation-Test-Report
        path: reports/ExtentReport.html